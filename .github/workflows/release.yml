# ──────────────────────────────────────────────────────────────
# Marco Extension — Release Pipeline
#
# Triggers on push to any branch matching  release/*
# (e.g.  release/v2.6.0).
#
# Produces a GitHub Release with these assets:
#   • marco-extension-v{VER}.zip   — Chrome extension dist contents
#   • prompts-v{VER}.zip           — standalone-scripts/prompts/**
#   • macro-controller-v{VER}.zip  — standalone-scripts/macro-controller/**
#   • marco-sdk-v{VER}.zip         — standalone-scripts/marco-sdk/**
#   • xpath-v{VER}.zip             — standalone-scripts/xpath/**
#   • install-extension.sh         — Bash install/download helper
#   • install-extension.ps1        — PowerShell install/download helper
#   • VERSION.txt                  — Plain-text version identifier
#   • CHANGELOG.md                 — Project changelog (full)
# ──────────────────────────────────────────────────────────────

name: Release Build

on:
  push:
    branches:
      - "release/*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Extract version from branch name ──────────────────
      - name: Extract version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${BRANCH}"

      # ── Setup Node.js ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Install root dependencies ─────────────────────────
      - name: Install root dependencies
        run: npm ci

      # ── Install Chrome extension dependencies ─────────────
      - name: Install extension dependencies
        working-directory: chrome-extension
        run: npm ci

      # ── Run test suite ──────────────────────────────────
      - name: Run tests
        run: npx vitest run

      # ── Build Chrome extension ────────────────────────────
      - name: Build Chrome extension
        working-directory: chrome-extension
        run: npm run build

      # ── Package assets ────────────────────────────────────
      - name: Package release assets
        env:
          VER: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p release-assets

          # ── Chrome extension — zip dist/ contents (no dist/ prefix) ──
          cd chrome-extension/dist
          zip -r "../../release-assets/marco-extension-${VER}.zip" .
          cd ../..

          # ── Standalone scripts ──
          cd standalone-scripts/prompts
          zip -r "../../release-assets/prompts-${VER}.zip" .
          cd ../..

          cd standalone-scripts/macro-controller
          zip -r "../../release-assets/macro-controller-${VER}.zip" .
          cd ../..

          cd standalone-scripts/marco-sdk
          zip -r "../../release-assets/marco-sdk-${VER}.zip" .
          cd ../..

          cd standalone-scripts/xpath
          zip -r "../../release-assets/xpath-${VER}.zip" .
          cd ../..

          # ── Install scripts ──
          cp scripts/install-extension.sh  release-assets/install-extension.sh
          cp scripts/install-extension.ps1 release-assets/install-extension.ps1
          chmod +x release-assets/install-extension.sh

          # ── VERSION.txt ──
          echo "${VER}" > release-assets/VERSION.txt

          # ── CHANGELOG.md (full project changelog) ──
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md release-assets/CHANGELOG.md
          fi

          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Generate release notes from commit history ────────
      - name: Generate release notes
        id: changelog
        run: |
          VER="${{ steps.version.outputs.tag }}"

          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog: ${PREV_TAG}..HEAD"
            RANGE="${PREV_TAG}..HEAD"
          else
            echo "No previous tag found — using full history"
            RANGE=""
          fi

          # Build categorized release notes
          {
            echo "## Marco Extension ${VER}"
            echo ""
            echo "### What's Changed"
            echo ""

            # Features
            FEATS=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" -i 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "#### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" -i 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "#### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Refactors / chores / docs
            OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^refactor\|^chore\|^docs\|^style\|^perf\|^test\|^ci\|^build" -i 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "#### 🔧 Maintenance"
              echo "$OTHER"
              echo ""
            fi

            # Uncategorized
            ALL=$(git log $RANGE --pretty=format:"%s" 2>/dev/null || true)
            UNCATEGORIZED=$(echo "$ALL" | grep -ivE "^(feat|fix|refactor|chore|docs|style|perf|test|ci|build)" || true)
            if [ -n "$UNCATEGORIZED" ]; then
              echo "#### 📝 Other Changes"
              echo "$UNCATEGORIZED" | while IFS= read -r line; do
                HASH=$(git log $RANGE --pretty=format:"%h" --grep="^${line}$" -1 2>/dev/null || true)
                echo "- ${line} (${HASH})"
              done
              echo ""
            fi

            echo "---"
            echo ""
            echo "### 📦 Assets"
            echo ""
            echo "| Asset | Description |"
            echo "|-------|-------------|"
            echo "| \`marco-extension-${VER}.zip\` | Chrome extension — load unpacked in \`chrome://extensions\` |"
            echo "| \`prompts-${VER}.zip\` | AI prompt templates |"
            echo "| \`macro-controller-${VER}.zip\` | Standalone macro controller scripts |"
            echo "| \`marco-sdk-${VER}.zip\` | Marco SDK |"
            echo "| \`xpath-${VER}.zip\` | XPath utility scripts |"
            echo "| \`install-extension.sh\` | Bash installer (Linux/macOS) |"
            echo "| \`install-extension.ps1\` | PowerShell installer (Windows) |"
            echo "| \`VERSION.txt\` | Version identifier |"
            echo "| \`CHANGELOG.md\` | Full project changelog |"
            echo ""
            echo "### 🚀 Quick Install"
            echo ""
            echo "**Linux / macOS:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/\${GITHUB_REPOSITORY}/releases/download/${VER}/install-extension.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "**Windows (PowerShell):**"
            echo "\`\`\`powershell"
            echo "irm https://github.com/\${GITHUB_REPOSITORY}/releases/download/${VER}/install-extension.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "Or download the \`marco-extension-${VER}.zip\`, extract, and load manually in \`chrome://extensions\` → Developer mode → Load unpacked."
          } > release-assets/RELEASE_NOTES.md

          cat release-assets/RELEASE_NOTES.md

      # ── Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Marco Extension ${{ steps.version.outputs.tag }}"
          body_path: release-assets/RELEASE_NOTES.md
          files: release-assets/*
          draft: false
          prerelease: false
