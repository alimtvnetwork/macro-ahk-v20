# ──────────────────────────────────────────────────────────────
# Marco Extension — Release Pipeline
#
# Triggers on push to any branch matching  release/**
# (e.g.  release/v2.112.0).
#
# Produces a GitHub Release with these assets:
#   - marco-extension-{VER}.zip    — Chrome extension dist contents
#   - prompts-{VER}.zip            — standalone-scripts/prompts/**
#   - macro-controller-{VER}.zip   — standalone-scripts/macro-controller/**
#   - marco-sdk-{VER}.zip          — standalone-scripts/marco-sdk/**
#   - xpath-{VER}.zip              — standalone-scripts/xpath/**
#   - install.sh                   — Bash install/download helper
#   - install.ps1                  — PowerShell install/download helper
#   - VERSION.txt                  — Plain-text version identifier
#   - CHANGELOG.md                 — Project changelog (full)
#   - checksums.txt                — SHA256 checksums of all assets
#
# NOTE: No email or notification integrations — by design.
# ──────────────────────────────────────────────────────────────

name: Release Build

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"

# Release builds must NEVER be cancelled — every release commit
# must produce a GitHub Release regardless of newer commits.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Extract version from branch name ──────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF_NAME#release/}"
          else
            echo "::error::Unexpected ref: $GITHUB_REF"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # ── Setup Node.js ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Setup pnpm ────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── Install root dependencies ─────────────────────────
      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Install Chrome extension dependencies ─────────────
      - name: Install extension dependencies
        working-directory: chrome-extension
        run: |
          # Remove local-only pnpm-workspace.yaml (contains Windows storeDir path)
          rm -f pnpm-workspace.yaml
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile --lockfile=false
          fi

      # ── Run linters ───────────────────────────────────────
      - name: Run root lint
        run: pnpm run lint

      # ── Run test suite ────────────────────────────────────
      - name: Run tests
        run: pnpm run test

      # ── Build standalone scripts (SDK first, then others) ─
      - name: Build Marco SDK
        run: pnpm run build:sdk

      - name: Build XPath
        run: pnpm run build:xpath

      - name: Build Macro Controller
        run: pnpm run build:macro-controller

      # ── Build Chrome extension ────────────────────────────
      - name: Build Chrome extension
        run: pnpm run build:extension

      # ── Package assets ────────────────────────────────────
      - name: Package release assets
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release-assets

          # ── Copy README + VERSION into extension dist ──
          cp README.md chrome-extension/dist/README.md
          echo "${VER}" > chrome-extension/dist/VERSION

          # ── Remove source maps (must never ship in releases) ──
          MAP_COUNT=$(find chrome-extension/dist -name '*.map' | wc -l | tr -d ' ')
          find chrome-extension/dist -name '*.map' -delete
          echo "Removed ${MAP_COUNT} source map files"

          # ── Chrome extension — zip dist/ contents (no dist/ prefix) ──
          cd chrome-extension/dist
          zip -r "../../release-assets/marco-extension-${VER}.zip" .
          cd ../..

          # ── Standalone scripts ──
          if [ -d "standalone-scripts/prompts" ]; then
            cd standalone-scripts/prompts
            zip -r "../../release-assets/prompts-${VER}.zip" .
            cd ../..
          fi

          cd standalone-scripts/macro-controller
          zip -r "../../release-assets/macro-controller-${VER}.zip" .
          cd ../..

          cd standalone-scripts/marco-sdk
          zip -r "../../release-assets/marco-sdk-${VER}.zip" .
          cd ../..

          cd standalone-scripts/xpath
          zip -r "../../release-assets/xpath-${VER}.zip" .
          cd ../..

          # ── Install scripts ──
          cp scripts/install.sh  release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          chmod +x release-assets/install.sh

          # ── VERSION.txt ──
          echo "${VER}" > release-assets/VERSION.txt

          # ── CHANGELOG.md (full project changelog) ──
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md release-assets/CHANGELOG.md
          fi

          # ── Generate checksums ──
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt
          cd ..

          echo ""
          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Generate release notes from commit history ────────
      - name: Generate release notes
        id: changelog
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog: ${PREV_TAG}..HEAD"
            RANGE="${PREV_TAG}..HEAD"
          else
            echo "No previous tag found — using full history"
            RANGE=""
          fi

          REPO="${GITHUB_REPOSITORY}"
          COMMIT_SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Build categorized release notes
          {
            echo "## Marco Extension ${VER}"
            echo ""

            echo "### Release Info"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VER}\` |"
            echo "| Commit | \`${COMMIT_SHA:0:10}\` |"
            echo "| Branch | \`${BRANCH}\` |"
            echo "| Build Date | ${BUILD_DATE} |"
            echo ""

            echo "### What's Changed"
            echo ""

            # Features
            FEATS=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" -i 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "#### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" -i 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "#### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Refactors / chores / docs
            OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^refactor\|^chore\|^docs\|^style\|^perf\|^test\|^ci\|^build" -i 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "#### Maintenance"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""

            echo "### Checksums (SHA256)"
            echo ""
            echo "\`\`\`"
            cat release-assets/checksums.txt
            echo "\`\`\`"
            echo ""

            echo "### Assets"
            echo ""
            echo "| Asset | Description |"
            echo "|-------|-------------|"
            echo "| \`marco-extension-${VER}.zip\` | Chrome extension — load unpacked in \`chrome://extensions\` |"
            echo "| \`macro-controller-${VER}.zip\` | Standalone macro controller |"
            echo "| \`marco-sdk-${VER}.zip\` | SDK library |"
            echo "| \`xpath-${VER}.zip\` | XPath utility |"
            echo "| \`CHANGELOG.md\` | Full project changelog |"
            echo "| \`install.ps1\` | PowerShell installer (Windows) |"
            echo "| \`install.sh\` | Bash installer (Linux/macOS) |"
            echo "| \`VERSION.txt\` | Version identifier |"
            echo "| \`checksums.txt\` | SHA256 checksums |"
            echo ""
            echo "### Quick Install"
            echo ""
            echo "**Windows (PowerShell):**"
            echo "\`\`\`powershell"
            echo "irm https://raw.githubusercontent.com/${REPO}/main/scripts/install.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "**Pin this version (Windows):**"
            echo "\`\`\`powershell"
            echo "& { \\\$Version = \"${VER}\"; irm https://raw.githubusercontent.com/${REPO}/main/scripts/install.ps1 | iex }"
            echo "\`\`\`"
            echo ""
            echo "**Linux / macOS:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/scripts/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "**Pin this version (Linux / macOS):**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/scripts/install.sh | bash -s -- --version ${VER}"
            echo "\`\`\`"
            echo ""
            echo "### Manual Install (Chromium)"
            echo ""
            echo "1. Download \`marco-extension-${VER}.zip\` from this release."
            echo "2. Extract it to a local folder."
            echo "3. Open \`chrome://extensions\`."
            echo "4. Enable **Developer mode**."
            echo "5. Click **Load unpacked** and select the extracted folder."
          } > release-assets/RELEASE_NOTES.md

          cat release-assets/RELEASE_NOTES.md

      # ── Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Marco Extension ${{ steps.version.outputs.version }}"
          body_path: release-assets/RELEASE_NOTES.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          make_latest: ${{ !contains(steps.version.outputs.version, '-') }}
